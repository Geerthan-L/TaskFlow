<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow – Smart Task Management</title>
    <meta name="description" content="TaskFlow is a modern task and project management application with real-time dashboards, Kanban boards, and intuitive drag-and-drop task management." />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0E0E14; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2A2A3E; border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: #3A3A5E; }

      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
      @keyframes slideInLeft { from { opacity: 0; transform: translateX(-16px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 0 0 rgba(108,99,255,0.3); } 50% { box-shadow: 0 0 20px 4px rgba(108,99,255,0.15); } }
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes countUp { from { opacity: 0; transform: scale(0.5); } to { opacity: 1; transform: scale(1); } }
      @keyframes dropHighlight { 0% { box-shadow: 0 0 0 0 rgba(108,99,255,0.4); } 50% { box-shadow: 0 0 16px 4px rgba(108,99,255,0.2); } 100% { box-shadow: 0 0 0 0 transparent; } }
      @keyframes cardEnter { from { opacity: 0; transform: translateY(12px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
      @keyframes breathe { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

      .fade-in { animation: fadeIn 0.4s ease-out both; }
      .slide-up { animation: slideUp 0.35s cubic-bezier(.4,0,.2,1) both; }
      .slide-left { animation: slideInLeft 0.3s ease-out both; }
      .card-enter { animation: cardEnter 0.35s cubic-bezier(.4,0,.2,1) both; }
      .pulse-glow { animation: pulseGlow 2.5s ease-in-out infinite; }
      .logo-gradient { -webkit-background-clip: text !important; background-clip: text !important; -webkit-text-fill-color: transparent !important; color: transparent !important; }

      .kanban-col { transition: background 0.2s, box-shadow 0.2s; border-radius: 16px; }
      .kanban-col.drag-over { background: rgba(108,99,255,0.08) !important; box-shadow: inset 0 0 0 2px rgba(108,99,255,0.3); }
      .kanban-card { transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s; cursor: grab; }
      .kanban-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
      .kanban-card:active { cursor: grabbing; }
      .kanban-card.dragging { opacity: 0.5; transform: rotate(2deg) scale(0.96); }

      .btn-primary { transition: transform 0.15s, box-shadow 0.15s, filter 0.15s; }
      .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,0.35); filter: brightness(1.1); }
      .btn-primary:active { transform: translateY(0) scale(0.97); }

      .nav-item-hover { transition: all 0.2s cubic-bezier(.4,0,.2,1); }
      .nav-item-hover:hover { background: rgba(108,99,255,0.12) !important; transform: translateX(3px); }

      .stat-card { transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; }
      .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

      .task-row-hover { transition: all 0.15s ease; }
      .task-row-hover:hover { background: rgba(108,99,255,0.1) !important; transform: translateX(2px); }

      .proj-card { transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
      .proj-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.25); }

      .view-toggle-btn { transition: all 0.2s; }
      .view-toggle-btn:hover { background: rgba(108,99,255,0.15) !important; }

      .modal-backdrop { animation: fadeIn 0.2s ease-out; }
      .modal-content { animation: slideUp 0.3s cubic-bezier(.4,0,.2,1); }

      .input-glow:focus { border-color: #6C63FF !important; box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }

      select option { background: #13131C; color: #E8E8F0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
